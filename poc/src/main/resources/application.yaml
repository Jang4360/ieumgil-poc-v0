spring:
  application:
    name: poc

poc:
  network-build:
    enabled: false
    source-pbf: etl/data/raw/busan.osm.pbf
    output-directory: build/network-snapshots/latest
    build-identifier: local-manual
    code-revision: unknown
    fail-on-duplicate-stable-key: true
  network-persistence:
    enabled: false
    jdbc-url: jdbc:postgresql://localhost:5432/poc
    username: poc
    password: poc
    truncate-before-load: true
  graphhopper-import:
    enabled: false
    source-pbf: etl/data/raw/busan.osm.pbf
    artifact-directory: build/graphhopper-artifacts/latest
    graph-directory-name: graph-cache
    build-identifier: local-manual
    code-revision: unknown
    jdbc-url: jdbc:postgresql://localhost:5432/poc
    username: poc
    password: poc
    delete-existing-artifact: true
    fail-on-duplicate-stable-key: true
    fail-on-unmatched-segment: true
  graphhopper-load:
    enabled: false
    artifact-directory: build/graphhopper-artifacts/latest
    graph-directory-name: graph-cache
    ready-marker: build/graphhopper-artifacts/latest/load-ready.txt
    allow-writes: false
  transit-mixed:
    enabled: true
    max-candidates: 3
    odsay-api-base-url: ${ODSAY_API_BASE_URL:https://api.odsay.com/v1/api}
    odsay-api-key: ${ODSAY_API_KEY:}
    odsay-server-ip: ${ODSAY_SERVER_IP:}
    busan-bims-api-base-url: ${BUSAN_BIMS_API_BASE_URL:https://apis.data.go.kr/6260000/BusanBIMS}
    busan-bims-service-key-encoding: ${BUSAN_BIMS_SERVICE_KEY_ENCODING:}
    busan-bims-service-key-decoding: ${BUSAN_BIMS_SERVICE_KEY_DECODING:}
    busan-subway-operation-api-base-url: ${BUSAN_SUBWAY_OPERATION_API_BASE_URL:https://api.odcloud.kr/api}
    busan-subway-operation-api-path: ${BUSAN_SUBWAY_OPERATION_API_PATH:}
    busan-subway-operation-service-key-encoding: ${BUSAN_SUBWAY_OPERATION_SERVICE_KEY_ENCODING:}
    busan-subway-operation-service-key-decoding: ${BUSAN_SUBWAY_OPERATION_SERVICE_KEY_DECODING:}
